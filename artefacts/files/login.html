<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AuthEngine — Sign In</title>
  <style>
    body { font-family: monospace; max-width: 360px; margin: 80px auto; padding: 0 1rem; }
    h1   { font-size: 1.2rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: .25rem; font-size: .875rem; }
    input { display: block; width: 100%; padding: .4rem; margin-bottom: 1rem;
            box-sizing: border-box; font-family: monospace; }
    button { padding: .45rem 1.2rem; font-family: monospace; cursor: pointer; }
    .error { color: #c00; font-size: .85rem; margin-top: .5rem; }
  </style>
</head>
<body>
  <h1>auth_engine / sign in</h1>
  <form method="POST" action="/login">
    <label for="username">username</label>
    <input id="username" name="username" type="text"
           autocomplete="username" required autofocus />

    <label for="password">password</label>
    <input id="password" name="password" type="password"
           autocomplete="current-password" required />

    <button type="submit">sign in →</button>
  </form>

  <!-- Server injects an error message here on failed login.
       Example: <p class="error">Invalid credentials.</p>  -->
</body>
</html>

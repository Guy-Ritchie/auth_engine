repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.17
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.1.0
    hooks:
      - id: mypy
        args: [--strict, --ignore-missing-imports]
        additional_dependencies: [] # no stubs needed - we're using stdlib's only!

  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: |
          (?x)^(
            tests/fixtures/.*|
            \.secrets\.baseline
          )$

  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest (unit tests only)
        entry: >
          uv run pytest tests/unit/ -q --tb=short --no-header
          --no-cov-on-fail
        language: system
        pass_filenames: false
        verbose: false
        stages: [pre-commit]